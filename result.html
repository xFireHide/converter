<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Processado</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <main class="main-content">
        <h1 id="page-title">PDF Processado</h1>

        <!-- AdSense Aqui: Entre o título e o conteúdo -->
        <div class="ads-banner-top">
          <!-- AdSense Aqui -->
        </div>

        <p>Seu PDF foi processado com sucesso!</p>

        <div class="button-group">
          <button id="download-btn">📥 Baixar PDF</button>
          <button id="copy-link-btn">📋 Copiar link</button>
          <button id="process-again-btn">🔄 Processar outro PDF</button>
        </div>

        <!-- AdSense Aqui: Parte inferior da página -->
        <div class="adsense-bottom">
          <!-- AdSense Aqui -->
        </div>
      </main>

      <aside class="sidebar">
        <!-- AdSense Aqui: Lateral direita sticky -->
      </aside>
    </div>

    <script>
      document
        .getElementById("download-btn")
        .addEventListener("click", function () {
          window.location.href = "{{ file_url }}";
        });
      document
        .getElementById("copy-link-btn")
        .addEventListener("click", function () {
          const url = "{{ file_url }}";
          navigator.clipboard
            .writeText(url)
            .then(function () {
              alert("Link copiado para a área de transferência!");
            })
            .catch(function () {
              alert("Não foi possível copiar o link.");
            });
        });
      document
        .getElementById("process-again-btn")
        .addEventListener("click", function () {
          window.location.href = "{{ url_for('index') }}";
        });
    </script>
  </body>
</html>
