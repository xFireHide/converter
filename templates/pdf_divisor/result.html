{% extends 'base.html' %} {% block title %}Página Inicial{% endblock %} {% block
content %}
<div class="main-content">
  <h1>PDF Processado</h1>
  <p>Seu PDF foi processado com sucesso!</p>
  <div class="button-group">
    <a
      class="btn"
      href="{{ url_for('pdf_divisor.download_file', filename=filename) }}"
      download
    >
      📥 Baixar PDF
    </a>
    <a class="btn" href="{{ url_for('pdf_divisor.index') }}">
      🔄 Processar outro PDF
    </a>
  </div>
  <div class="ads-banner-top"></div>
  <div class="adsense-bottom"></div>
</div>
{% endblock %} {% block scripts %}
<script>
  window.DOWNLOAD_LINK =
    "{{ url_for('pdf_divisor.download_file', filename=filename, _external=True) }}";
</script>
<script src="{{ url_for('static', filename='js/result.js') }}"></script>
{% endblock %}
