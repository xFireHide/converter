{% extends 'base.html' %} {% block title %}Vídeo Convertido{% endblock %} {%
block content %}
<div class="main-content">
  <h1>Vídeo Convertido</h1>
  <video width="320" controls>
    <source
      src="{{ url_for('static', filename='video_converter/converted/' ~ filename) }}"
    />
    Seu navegador não suporta o elemento de vídeo.
  </video>
  <div class="button-group">
    <a
      class="btn"
      href="{{ url_for('static', filename='video_converter/converted/' ~ filename) }}"
      download
      >📥 Baixar Vídeo</a
    >
    <a class="btn" href="{{ url_for('video_converter.index') }}"
      >🔄 Converter outro vídeo</a
    >
  </div>
</div>
{% endblock %}
