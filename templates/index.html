<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Divisor de PDF</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6031916610010710"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="container">
      <main class="main-content">
        <h1 id="page-title">Divisor de PDF</h1>

        <!-- Descrição da ferramenta -->
        <p class="description">
          Divida cada página do seu PDF em quatro quadrantes, tudo de forma
          automática e instantânea.
        </p>

        <div class="ads-banner-top"></div>

        <form id="upload-form" method="POST" enctype="multipart/form-data">
          <input type="file" name="pdf" id="pdf-input" required />
          <button type="submit">Enviar</button>
        </form>

        <div id="progress-container" class="hidden">
          <div id="progress-bar">
            <span id="progress-text">0%</span>
          </div>
        </div>

        <div class="adsense-bottom"></div>
      </main>
      <aside class="sidebar"></aside>
    </div>

    <script src="{{ url_for('static', filename='redirect.js') }}"></script>
  </body>
</html>
