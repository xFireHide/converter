<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Divisor de PDF em 4 Quadrantes</title>
    <meta
      name="description"
      content="Divida PDFs em 4 quadrantes automaticamente e extraia só as áreas com texto e imagens úteis. Simplifique o processamento de documentos em instantes."
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <div class="container">
      <main class="main-content">
        <h1 id="page-title">Divisor de PDF</h1>
        <p class="description">
          Divida cada página do seu PDF em quatro quadrantes.
        </p>

        <div class="ads-banner-top"></div>

        <form id="upload-form">
          <input type="file" id="pdf-input" accept="application/pdf" required />
          <button type="submit" id="upload-button">Processar PDF</button>
        </form>

        <div id="progress-container" class="hidden">
          <div id="progress-bar">
            <span id="progress-text">0%</span>
          </div>
        </div>

        <div class="adsense-bottom"></div>
      </main>
      <aside class="sidebar"></aside>
    </div>

<script src="{{ url_for('static', filename='redirect.js') }}"></script>

    
  </body>
</html>
