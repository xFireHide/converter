<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Divisor de PDF</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="container">
      <main class="main-content">
        <h1 id="page-title">Processador de PDF</h1>

        <!-- Descrição da ferramenta -->
        <p class="description">
          Divida cada página do seu PDF em quatro quadrantes e extraia somente
          as partes que contêm conteúdo, tudo de forma automática e instantânea.
        </p>

        <!-- AdSense Aqui: Entre o título e a barra de progresso -->
        <div class="ads-banner-top">
          <!-- AdSense Aqui -->
        </div>

        <form id="upload-form" method="POST" enctype="multipart/form-data">
          <input type="file" name="pdf" id="pdf-input" required />
          <button type="submit">Enviar</button>
        </form>

        <div id="progress-container" class="hidden">
          <div id="progress-bar">
            <span id="progress-text">0%</span>
          </div>
        </div>

        <!-- AdSense Aqui: Parte inferior da página -->
        <div class="adsense-bottom">
          <!-- AdSense Aqui -->
        </div>
      </main>
      <aside class="sidebar">
        <!-- AdSense Aqui: Lateral direita sticky -->
      </aside>
    </div>

    <!-- Carrega o JS de redirecionamento -->
    <script src="{{ url_for('static', filename='redirect.js') }}"></script>
  </body>
</html>
