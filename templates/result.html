<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Processado</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="container">
      <main class="main-content">
        <h1>PDF Processado</h1>

        <p>Seu PDF foi processado com sucesso!</p>

        <div class="button-group">
          <!-- Baixar via rota dedicada -->
          <a class="btn" href="{{ url_for('download_file', filename=filename) }}" download>
            📥 Baixar PDF
          </a>
          <!-- Copiar link -->
          <button id="copy-link-btn">📋 Copiar link</button>
          <!-- Voltar ao início -->
          <a class="btn" href="{{ url_for('index') }}">
            🔄 Processar outro PDF
          </a>
        </div>
      </main>
    </div>
<script src="{{ url_for('static', filename='result.js') }}"></script>

  </body>
</html>
