{% extends 'base.html' %} {% block title %} PDF Processado {% endblock %} {%
block content %}
<div class="main-content">
  <h1>PDF Processado</h1>
  <p>Seu PDF foi processado com sucesso!</p>

  <div class="button-group">
    <!-- 1) Baixar PDF -->
    <a
      class="btn"
      href="{{ url_for('serve_file', filename=filename) }}"
      download
    >
      📥 Baixar PDF
    </a>

    <!-- 2) Copiar link -->
    <button id="copy-link-btn" class="btn">📋 Copiar link</button>

    <!-- 3) Processar outro PDF (rota corrigida) -->
    <a class="btn" href="{{ url_for('pdf_divisor') }}">
      🔄 Processar outro PDF
    </a>
  </div>

  <div class="ads-banner-top"></div>
  <div class="adsense-bottom"></div>
</div>
{% endblock %} {% block scripts %}
<script>
  window.DOWNLOAD_LINK =
    "{{ url_for('serve_file', filename=filename, _external=True) }}";
</script>
<script src="{{ url_for('static', filename='result.js') }}"></script>
{% endblock %}
