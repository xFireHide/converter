<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Processado</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="container">
      <main class="main-content">
        <h1>PDF Processado</h1>

        <p>Seu PDF foi processado com sucesso!</p>

        <div class="button-group">
          <!-- Link de download via rota dedicada -->
          <a class="btn" href="{{ url_for('download_file', filename=filename) }}" download>
            📥 Baixar PDF
          </a>
          <button id="copy-link-btn">📋 Copiar link</button>
          <a class="btn" href="{{ url_for('index') }}">🔄 Processar outro PDF</a>
        </div>
      </main>
    </div>

    <script>
      // Copiar link para área de transferência
      document.getElementById("copy-link-btn").addEventListener("click", function () {
        const link = window.location.origin +
          "" +
          "{{ url_for('download_file', filename=filename) }}";
        navigator.clipboard.writeText(link)
          .then(() => alert("Link copiado!"))
          .catch(() => alert("Falha ao copiar link."));
      });
    </script>
  </body>
</html>
